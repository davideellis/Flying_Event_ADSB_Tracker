{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>Password Reset</h1>
  {% if message %}<p>{{ message }}</p>{% endif %}
  {% if token_value %}
  <p class="dev-note">Dev token: <code>{{ token_value }}</code></p>
  <p><a href="{{ base_url }}/auth/reset/complete?token={{ token_value }}">Open reset form</a></p>
  {% endif %}
  <form method="post" class="stack-form">
    <label>Email <input name="email" type="email" required></label>
    <button class="button" type="submit">Issue reset token</button>
  </form>
</section>
{% endblock %}
