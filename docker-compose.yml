services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      FEAT_DATABASE_URL: postgresql+psycopg://feat:feat@db:5432/feat
      FEAT_SECRET_KEY: dev-secret-key
      FEAT_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      FEAT_BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
      FEAT_ADSB_PROVIDER: stub
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: feat
      POSTGRES_USER: feat
      POSTGRES_PASSWORD: feat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feat -d feat"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
